# configs/models/plaque.yaml
# ─────────────────────────────────────────────
# Datasets:
#   Primary : MDPI Diagnostics 2025 — 531 RGB images, disclosing-gel stained
#             https://www.mdpi.com/2075-4418/15/2/231
#             (contact authors: ramirez-pedraza et al.)
#   Secondary: Roboflow Universe — search "dental plaque"
#
# ⚠️  IMPORTANT: The primary dataset uses disclosing gel (blue/purple stain).
# This is a DOMAIN GAP vs natural-light photos from your Pi camera.
# Mitigation: use a separate val set of natural-light images.
# The normalize.py script adds a --domain-shift flag for color-space
# augmentation to partially bridge this gap.

path:   ../../data/processed/plaque
train:  images/train
val:    images/val
test:   images/test

nc: 1
names: ["plaque"]

overrides:
  epochs:  80
  imgsz:   640
  batch:   16
  # Aggressive HSV aug to compensate for gel vs natural-light gap
  hsv_h:   0.03
  hsv_s:   0.7
  hsv_v:   0.5
